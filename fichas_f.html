<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Dashboard - Castle Dungeon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@800&display=swap" rel="stylesheet">
    <style>
        body {
            background-image: url('https://images.unsplash.com/photo-1599408162449-604433f0059e?q=80&w=2070&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #0f1115;
            min-height: 100vh;
        }

        .overlay-dungeon {
            background-color: rgba(15, 17, 21, 0.94);
            backdrop-filter: blur(4px);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .dungeon-font {
            font-family: 'JetBrains Mono', monospace;
            text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.9);
        }

        @keyframes ticker-scroll {
            0% { transform: translateX(100vw); }
            100% { transform: translateX(-100%); }
        }
        
        .animate-ticker {
            display: inline-block;
            white-space: nowrap;
            animation: ticker-scroll 25s linear infinite;
        }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #4b5563; border-radius: 10px; }
        
        .card-active { 
            border-color: #fbbf24 !important; 
            background-color: rgba(55, 65, 81, 0.5) !important; 
        }

        .stone-card {
            background: rgba(26, 28, 32, 0.85);
            border: 1px solid #374151;
            transition: all 0.2s ease;
        }
    </style>
</head>
<body class="text-gray-300 font-sans">

    <div class="overlay-dungeon">
        
        <section class="ticker-container bg-black/80 py-4 overflow-hidden border-b-2 border-gray-700 shadow-2xl">
            <div id="ticker-display" class="animate-ticker text-2xl dungeon-font text-gray-500 uppercase">
                Sincronizando registros...
            </div>
        </section>

        <div class="flex flex-1 overflow-hidden">
            <aside class="w-1/4 bg-black/40 border-r border-gray-800 flex flex-col min-h-[600px]">
                <div class="p-4 border-b border-gray-800 flex justify-between items-center bg-black/20">
                    <button onclick="DashboardApp.clearFilter()" class="font-bold text-gray-400 uppercase text-[10px] tracking-widest hover:text-white transition-colors">
                        Mural de Heróis
                    </button>
                    <span id="aside-count" class="bg-gray-800 text-[10px] px-2 py-1 rounded text-gray-400 font-bold border border-gray-700">0</span>
                </div>
                <div id="character-list" class="flex-1 overflow-y-auto p-4 space-y-3 custom-scroll">
                </div>
            </aside>

            <main class="flex-1 p-8 overflow-y-auto custom-scroll">
                <header class="mb-10 flex justify-between items-center border-b border-gray-700 pb-4">
                    <div>
                        <h1 class="text-4xl font-black text-white tracking-tighter italic uppercase">Câmara do Castelo</h1>
                        <p class="text-gray-500 text-xs uppercase tracking-widest mt-1">Status de Combate</p>
                    </div>
                    <button onclick="DashboardApp.resetData()" class="text-[10px] text-gray-600 hover:text-red-500 transition-colors uppercase font-bold">Expurgar Dados</button>
                </header>

                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
                    <div class="stone-card p-6 border-l-4 border-indigo-500 shadow-xl">
                        <span class="text-gray-500 text-[10px] font-bold uppercase">Dificuldade</span>
                        <div id="stat-avg-difficulty" class="text-3xl font-black text-gray-100">0.0</div>
                    </div>
                    <div class="stone-card p-6 border-l-4 border-amber-500 shadow-xl">
                        <span class="text-gray-500 text-[10px] font-bold uppercase">Baús</span>
                        <div id="stat-total-chests" class="text-3xl font-black text-amber-400">0</div>
                    </div>
                    <div class="stone-card p-6 border-l-4 border-red-600 shadow-xl">
                        <span class="text-gray-500 text-[10px] font-bold uppercase">Vida</span>
                        <div id="stat-total-hp" class="text-3xl font-black text-red-500">0</div>
                    </div>
                </div>

                <section class="stone-card p-8 rounded shadow-2xl h-[450px] mb-8">
                    <canvas id="main-chart"></canvas>
                </section>
            </main>
        </div>

        <footer class="bg-black/90 border-t border-gray-700 p-6 w-full mt-auto">
            <form id="player-form" class="max-w-screen-2xl mx-auto grid grid-cols-1 md:grid-cols-5 gap-4">
                <input type="text" id="in-name" placeholder="NOME DO HERÓI" required class="bg-gray-900 border border-gray-700 p-3 text-sm text-gray-300 outline-none focus:border-indigo-500 uppercase font-bold">
                <input type="number" id="in-diff" placeholder="DIF" value="10" required class="bg-gray-900 border border-gray-700 p-3 text-sm text-gray-300 outline-none">
                <input type="number" id="in-hp" placeholder="PV" value="50" required class="bg-gray-900 border border-gray-700 p-3 text-sm text-gray-300 outline-none">
                <input type="number" id="in-chests" placeholder="BAÚS" value="5" required class="bg-gray-900 border border-gray-700 p-3 text-sm text-gray-300 outline-none">
                <button type="submit" class="bg-indigo-700 hover:bg-indigo-600 text-white font-black text-xs uppercase tracking-widest transition-all p-3">Sincronizar</button>
            </form>
        </footer>
    </div>

    <script>
        const DashboardApp = {
            storageKey: 'periculum_dungeon_v1',
            chart: null,
            filterIndex: null,
            defaultData: [
                { nome: 'Gerard', dificuldade: 15, pv: 40, baus: 8 },
                { nome: 'Ragnar', dificuldade: 10, pv: 60, baus: 15 }
            ],

            init() {
                document.getElementById('player-form').addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.addPlayer();
                });
                this.render();
            },

            getPlayers() {
                const stored = localStorage.getItem(this.storageKey);
                return stored ? JSON.parse(stored) : this.defaultData;
            },

            addPlayer() {
                const players = this.getPlayers();
                players.push({
                    nome: document.getElementById('in-name').value.trim(),
                    dificuldade: Number(document.getElementById('in-diff').value),
                    pv: Number(document.getElementById('in-hp').value),
                    baus: Number(document.getElementById('in-chests').value)
                });
                localStorage.setItem(this.storageKey, JSON.stringify(players));
                this.filterIndex = null;
                this.render();
                document.getElementById('player-form').reset();
            },

            applyFilter(index) {
                this.filterIndex = (this.filterIndex === index) ? null : index;
                this.render();
            },

            clearFilter() {
                this.filterIndex = null;
                this.render();
            },

            updateTicker(players) {
                const ticker = document.getElementById('ticker-display');
                ticker.innerText = players.length ? players.map(p => `[ ${p.nome.toUpperCase()} | DIF ${p.dificuldade} | PV ${p.pv} | BAÚS ${p.baus} ]`).join('  •  ') : "Vazio...";
            },

            renderSidebar(players) {
                const container = document.getElementById('character-list');
                document.getElementById('aside-count').innerText = players.length;
                container.innerHTML = players.map((p, index) => `
                    <div onclick="DashboardApp.applyFilter(${index})" 
                         class="stone-card p-4 border cursor-pointer transition-all ${this.filterIndex === index ? 'card-active' : 'hover:border-gray-500'}">
                        <div class="mb-3">
                            <span class="font-black text-xs ${this.filterIndex === index ? 'text-white' : 'text-gray-400'} uppercase">${p.nome}</span>
                        </div>
                        <div class="grid grid-cols-3 gap-1 text-[9px] font-bold text-center">
                            <div class="bg-black/50 p-1 border border-indigo-900/30 text-indigo-400">DIF ${p.dificuldade}</div>
                            <div class="bg-black/50 p-1 border border-red-900/30 text-red-500">PV ${p.pv}</div>
                            <div class="bg-black/50 p-1 border border-amber-900/30 text-amber-500">B ${p.baus}</div>
                        </div>
                    </div>
                `).join('');
            },

            renderChart(filteredData) {
                const ctx = document.getElementById('main-chart').getContext('2d');
                if (this.chart) this.chart.destroy();
                
                const isSingle = this.filterIndex !== null;

                this.chart = new Chart(ctx, {
                    type: isSingle ? 'radar' : 'bar',
                    data: {
                        labels: ['Dificuldade', 'PV', 'Baús'],
                        datasets: isSingle ? [{
                            label: filteredData[0].nome,
                            data: [filteredData[0].dificuldade, filteredData[0].pv, filteredData[0].baus],
                            backgroundColor: 'rgba(251, 191, 36, 0.4)',
                            borderColor: '#fbbf24',
                            pointBackgroundColor: '#fff',
                            pointRadius: 6,
                            fill: true
                        }] : [
                            { label: 'Dificuldade', data: filteredData.map(p => p.dificuldade), backgroundColor: '#6366f1' },
                            { label: 'PV', data: filteredData.map(p => p.pv), backgroundColor: '#ef4444' },
                            { label: 'Baús', data: filteredData.map(p => p.baus), backgroundColor: '#fbbf24' }
                        ]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        scales: isSingle ? {
                            r: {
                                beginAtZero: true,
                                min: 0,
                                grid: { color: '#374151' },
                                angleLines: { color: '#374151' },
                                pointLabels: { color: '#9ca3af', font: { size: 14, weight: 'bold' } },
                                ticks: { display: false }
                            }
                        } : {
                            y: { beginAtZero: true, grid: { color: '#1f2937' }, ticks: { color: '#9ca3af' } },
                            x: { ticks: { color: '#9ca3af' }, grid: { display: false } }
                        },
                        plugins: { legend: { labels: { color: '#9ca3af' } } }
                    }
                });
            },

            render() {
                const allPlayers = this.getPlayers();
                const dataToShow = this.filterIndex !== null ? [allPlayers[this.filterIndex]] : allPlayers;
                
                this.updateTicker(allPlayers);
                this.renderSidebar(allPlayers);
                this.renderChart(dataToShow);

                const count = dataToShow.length || 1;
                document.getElementById('stat-avg-difficulty').innerText = (dataToShow.reduce((acc, p) => acc + p.dificuldade, 0) / count).toFixed(1);
                document.getElementById('stat-total-chests').innerText = dataToShow.reduce((acc, p) => acc + p.baus, 0);
                document.getElementById('stat-total-hp').innerText = dataToShow.reduce((acc, p) => acc + p.pv, 0);
            },

            resetData() {
                if(confirm("Expurgar registros?")) {
                    localStorage.removeItem(this.storageKey);
                    this.filterIndex = null;
                    this.render();
                }
            }
        };

        window.onload = () => DashboardApp.init();
    </script>
</body>
</html>
